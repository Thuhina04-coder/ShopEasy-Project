name: shop_easy
description: "ShopEasy - A mobile shopping application for browsing products, comparing prices, and ordering securely."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.4
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  flutter_rating_bar: ^4.0.1
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4
  sqflite_common_ffi_web: ^0.4.5+4
  path: ^1.9.1
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
